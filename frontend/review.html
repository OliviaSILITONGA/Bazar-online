<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ulasan — BazarUSU</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark: #5a7a1a;
      --green-mid: #7aab22;
      --green-light: #a8cc4f;
      --cream: #fafaf0;
      --white: #ffffff;
      --gray-100: #f0f0ec;
      --gray-200: #ddddd4;
      --gray-600: #666660;
      --gray-800: #333330;
      --red: #e53e3e;
      --radius-md: 14px;
      --radius-lg: 20px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Nunito Sans", sans-serif; background: var(--cream); color: var(--gray-800); display: flex; min-height: 100vh; }

    .sidebar { width: 64px; background: linear-gradient(180deg, #e8f5b8, #f5f0b0); border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; align-items: center; padding: 1.2rem 0; gap: 6px; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
    .sidebar .logo { width: 38px; height: 38px; background: var(--green-mid); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
    .sidebar .logo span { font-family: "Nunito", sans-serif; font-weight: 800; font-size: 16px; color: #fff; }
    .nav-item { width: 44px; height: 44px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: background 0.18s, transform 0.15s; text-decoration: none; }
    .nav-item:hover { background: rgba(122, 171, 34, 0.18); transform: scale(1.07); }
    .nav-item svg { width: 22px; height: 22px; stroke: var(--green-dark); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .nav-item::after { content: attr(data-label); position: absolute; left: 54px; background: var(--gray-800); color: #fff; font-size: 11px; font-family: "Nunito", sans-serif; font-weight: 600; padding: 4px 8px; border-radius: 6px; white-space: nowrap; pointer-events: none; opacity: 0; transform: translateX(-4px); transition: opacity 0.15s, transform 0.15s; z-index: 999; }
    .nav-item:hover::after { opacity: 1; transform: translateX(0); }
    .sidebar .spacer { flex: 1; }

    .main { margin-left: 64px; flex: 1; padding: 1.4rem 2rem; width: calc(100vw - 64px); }

    .page-title { font-family: "Nunito", sans-serif; font-weight: 800; font-size: 20px; color: var(--green-dark); margin-bottom: 1.4rem; }

    .review-form { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; max-width: 600px; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 13px; }
    .rating-input { display: flex; gap: 0.5rem; font-size: 24px; }
    .rating-input span { cursor: pointer; opacity: 0.4; transition: opacity 0.2s; }
    .rating-input span:hover, .rating-input span.active { opacity: 1; }
    .form-textarea { width: 100%; padding: 0.8rem; border: 1px solid var(--gray-200); border-radius: var(--radius-md); font-family: inherit; resize: vertical; min-height: 80px; }
    .btn { padding: 0.8rem 1.5rem; border-radius: var(--radius-lg); border: none; font-weight: 700; cursor: pointer; font-size: 14px; }
    .btn-primary { background: var(--green-mid); color: white; }
    .btn-primary:hover { background: var(--green-dark); }

    @media (max-width: 768px) {
      .sidebar { width: 54px; }
      .main { margin-left: 54px; width: calc(100vw - 54px); padding: 1rem; }
    }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="logo"><span>BU</span></div>
  <a class="nav-item" data-label="Beranda" href="index.html">
    <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
  </a>
  <a class="nav-item" data-label="Keranjang" href="cart.html">
    <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
  </a>
  <a class="nav-item" data-label="Pesanan" href="orders.html">
    <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="13" y2="15"/></svg>
  </a>
  <a class="nav-item" data-label="Pesan" href="messages.html">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
  </a>
  <div class="spacer"></div>
</nav>

<main class="main">
  <h1 class="page-title">⭐ Berikan Ulasan</h1>

  <div class="review-form">
    <div class="form-group">
      <label class="form-label">Rating</label>
      <div class="rating-input">
        <span class="star" data-rating="1">★</span>
        <span class="star" data-rating="2">★</span>
        <span class="star" data-rating="3">★</span>
        <span class="star" data-rating="4">★</span>
        <span class="star" data-rating="5">★</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Ulasan Anda</label>
      <textarea class="form-textarea" placeholder="Bagaimana pendapat Anda tentang produk ini? Ceritakan pengalaman Anda..."></textarea>
    </div>

    <button class="btn btn-primary">✓ Kirim Ulasan</button>
  </div>
</main>

<script>
  document.querySelectorAll('.star').forEach(star => {
    star.addEventListener('click', function() {
      const rating = this.dataset.rating;
      document.querySelectorAll('.star').forEach(s => {
        s.classList.remove('active');
        if (s.dataset.rating <= rating) {
          s.classList.add('active');
        }
      });
    });
  });
</script>
<script src="js/auth.js"></script>

</body>
</html>
