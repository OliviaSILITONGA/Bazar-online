<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keranjang — BazarUSU</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark:#5a7a1a; --green-mid:#7aab22; --green-light:#a8cc4f;
    --yellow-pale:#f8f7dc; --cream:#fafaf0; --white:#ffffff;
    --gray-100:#f0f0ec; --gray-200:#ddddd4; --gray-400:#a0a096;
    --gray-600:#666660; --gray-800:#333330; --red:#e53e3e;
    --radius-sm:8px; --radius-md:14px; --radius-lg:20px; --radius-xl:28px;
    --shadow-sm:0 2px 8px rgba(90,122,26,0.10); --shadow-md:0 4px 20px rgba(90,122,26,0.14);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito Sans',sans-serif; background:var(--cream); color:var(--gray-800); display:flex; min-height:100vh; }

  /* SIDEBAR */
  .sidebar { width:64px; background:linear-gradient(180deg,#e8f5b8,#f5f0b0); border-right:1px solid var(--gray-200); display:flex; flex-direction:column; align-items:center; padding:1.2rem 0; gap:6px; position:fixed; top:0; left:0; bottom:0; z-index:100; }
  .sidebar .logo { width:38px; height:38px; background:var(--green-mid); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; margin-bottom:10px; }
  .sidebar .logo span { font-family:'Nunito',sans-serif; font-weight:800; font-size:16px; color:#fff; }
  .nav-item { width:44px; height:44px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; transition:background .18s,transform .15s; text-decoration:none; }
  .nav-item:hover { background:rgba(122,171,34,.18); transform:scale(1.07); }
  .nav-item.active { background:var(--green-mid); }
  .nav-item svg { width:22px; height:22px; stroke:var(--green-dark); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .nav-item.active svg { stroke:#fff; }
  .nav-item .dot { position:absolute; top:6px; right:6px; width:8px; height:8px; border-radius:50%; background:var(--red); border:1.5px solid var(--yellow-pale); }
  .sidebar .spacer { flex:1; }
  .nav-item.add-btn { background:var(--green-light); border:2px dashed var(--green-dark); }
  .nav-item.add-btn:hover { background:var(--green-mid); border-style:solid; }
  .nav-item.add-btn:hover svg { stroke:#fff; }
  .nav-item::after { content:attr(data-label); position:absolute; left:54px; background:var(--gray-800); color:#fff; font-size:11px; font-family:'Nunito',sans-serif; font-weight:600; padding:4px 8px; border-radius:6px; white-space:nowrap; pointer-events:none; opacity:0; transform:translateX(-4px); transition:opacity .15s,transform .15s; z-index:999; }
  .nav-item:hover::after { opacity:1; transform:translateX(0); }

  /* MAIN */
  .main { margin-left:64px; flex:1; padding:1.4rem 2rem 7rem; width:calc(100vw - 64px); max-width:700px; }

  /* TOPBAR */
  .topbar { display:flex; align-items:center; gap:12px; margin-bottom:1.6rem; }
  .back-btn { width:40px; height:40px; border-radius:50%; background:var(--white); border:1px solid var(--gray-200); display:flex; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; transition:background .15s; }
  .back-btn:hover { background:var(--gray-100); }
  .back-btn svg { width:18px; height:18px; stroke:var(--gray-600); fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
  .page-title { font-family:'Nunito',sans-serif; font-weight:800; font-size:20px; flex:1; }
  .avatar-btn { width:46px; height:46px; border-radius:50%; overflow:hidden; border:2.5px solid var(--green-light); text-decoration:none; transition:transform .15s; }
  .avatar-btn:hover { transform:scale(1.06); }
  .avatar-ph { width:100%; height:100%; background:linear-gradient(135deg,var(--green-light),var(--green-mid)); display:flex; align-items:center; justify-content:center; font-family:'Nunito',sans-serif; font-weight:800; font-size:16px; color:#fff; }

  /* LIST HEADER */
  .list-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
  .section-label { font-family:'Nunito',sans-serif; font-weight:700; font-size:15px; color:var(--green-dark); }
  .select-all { display:flex; align-items:center; gap:7px; font-size:13px; font-weight:600; color:var(--gray-600); cursor:pointer; }
  .select-all input { width:16px; height:16px; accent-color:var(--green-mid); cursor:pointer; }

  /* SELLER GROUP */
  .seller-group { margin-bottom:1.4rem; }
  .group-header { display:flex; align-items:center; gap:8px; background:var(--gray-100); border-radius:var(--radius-md); padding:8px 12px; margin-bottom:8px; }
  .group-avatar { width:26px; height:26px; border-radius:50%; background:var(--green-mid); display:flex; align-items:center; justify-content:center; font-family:'Nunito',sans-serif; font-weight:800; font-size:10px; color:#fff; flex-shrink:0; }
  .group-name { font-family:'Nunito',sans-serif; font-weight:700; font-size:13px; color:var(--gray-800); flex:1; }
  .group-loc { font-size:11px; color:var(--gray-400); }
  .btn-chat { font-size:11px; padding:4px 10px; border-radius:99px; border:1px solid var(--gray-200); background:var(--white); color:var(--gray-600); cursor:pointer; font-family:'Nunito',sans-serif; font-weight:600; text-decoration:none; transition:border-color .15s,color .15s; }
  .btn-chat:hover { border-color:var(--green-light); color:var(--green-dark); }

  /* CART ITEM */
  .cart-list { display:flex; flex-direction:column; gap:10px; }
  .cart-item { background:var(--white); border:1.5px solid var(--gray-200); border-radius:var(--radius-lg); padding:14px; display:flex; gap:12px; align-items:center; transition:border-color .2s,box-shadow .2s,opacity .3s,transform .3s; }
  .cart-item.selected { border-color:var(--green-light); box-shadow:0 0 0 3px rgba(122,171,34,.10); }
  .cart-item.removing { opacity:0; transform:translateX(30px); }
  .item-check { width:18px; height:18px; accent-color:var(--green-mid); cursor:pointer; flex-shrink:0; }
  .item-img { width:80px; height:80px; border-radius:var(--radius-md); background:var(--gray-100); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:36px; border:1px solid var(--gray-200); text-decoration:none; transition:opacity .15s; overflow:hidden; }
  .item-img:hover { opacity:.82; }
  .item-body { flex:1; min-width:0; }
  .item-name { font-family:'Nunito',sans-serif; font-weight:700; font-size:15px; color:var(--gray-800); margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .item-desc { font-size:12px; color:var(--gray-400); margin-bottom:8px; }
  .item-bottom { display:flex; align-items:center; justify-content:space-between; }
  .item-price { font-family:'Nunito',sans-serif; font-weight:800; font-size:15px; color:var(--green-dark); }
  .item-sub { font-size:11px; color:var(--gray-400); }
  .item-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; flex-shrink:0; }
  .btn-del { width:30px; height:30px; border-radius:50%; background:#fff0f0; border:1px solid #fecaca; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s; }
  .btn-del:hover { background:#fee2e2; }
  .btn-del svg { width:14px; height:14px; stroke:var(--red); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .qty-wrap { display:flex; align-items:center; border:1.5px solid var(--gray-200); border-radius:var(--radius-md); overflow:hidden; }
  .qty-btn { width:30px; height:30px; background:none; border:none; font-family:'Nunito',sans-serif; font-weight:700; font-size:16px; cursor:pointer; color:var(--green-dark); display:flex; align-items:center; justify-content:center; transition:background .15s; }
  .qty-btn:hover { background:var(--gray-100); }
  .qty-num { width:30px; text-align:center; font-family:'Nunito',sans-serif; font-weight:700; font-size:13px; line-height:30px; border-left:1px solid var(--gray-200); border-right:1px solid var(--gray-200); }
  .note-input { width:100%; margin-top:8px; border:1.5px solid var(--gray-200); border-radius:var(--radius-md); padding:8px 12px; font-family:'Nunito Sans',sans-serif; font-size:12px; color:var(--gray-800); outline:none; background:var(--white); transition:border-color .18s; }
  .note-input:focus { border-color:var(--green-light); }
  .note-input::placeholder { color:var(--gray-400); }

  /* EMPTY */
  .empty-state { display:none; text-align:center; padding:5rem 1rem; }
  .empty-state .e-emoji { font-size:60px; margin-bottom:14px; }
  .empty-state p { font-family:'Nunito',sans-serif; font-weight:700; font-size:16px; color:var(--gray-600); margin-bottom:6px; }
  .empty-state small { font-size:13px; color:var(--gray-400); }
  .btn-jelajah { display:inline-flex; align-items:center; gap:7px; margin-top:20px; padding:11px 24px; background:var(--green-mid); border:none; border-radius:var(--radius-xl); font-family:'Nunito',sans-serif; font-weight:700; font-size:13px; color:#fff; cursor:pointer; text-decoration:none; box-shadow:var(--shadow-sm); transition:opacity .18s; }
  .btn-jelajah:hover { opacity:.88; }

  /* BOTTOM BAR */
  .bottom-bar { position:fixed; bottom:0; left:64px; right:0; background:var(--white); border-top:1px solid var(--gray-200); padding:14px 2rem; display:none; align-items:center; justify-content:space-between; gap:16px; box-shadow:0 -4px 20px rgba(0,0,0,.07); z-index:200; }
  .total-wrap .lbl { font-size:12px; color:var(--gray-400); margin-bottom:2px; }
  .total-wrap .val { font-family:'Nunito',sans-serif; font-weight:800; font-size:20px; color:var(--green-dark); }
  .total-wrap .cnt { font-size:11px; color:var(--gray-400); }
  .btn-checkout { padding:12px 32px; background:linear-gradient(135deg,var(--green-mid),var(--green-dark)); border:none; border-radius:var(--radius-xl); font-family:'Nunito',sans-serif; font-weight:800; font-size:15px; color:#fff; cursor:pointer; box-shadow:var(--shadow-md); transition:opacity .18s,transform .15s; white-space:nowrap; }
  .btn-checkout:hover { opacity:.9; transform:translateY(-1px); }
  .btn-checkout:disabled { opacity:.35; cursor:not-allowed; transform:none; }

  /* TOAST */
  #toast { position:fixed; bottom:86px; left:50%; transform:translateX(-50%) translateY(30px); background:var(--gray-800); color:#fff; padding:10px 22px; border-radius:var(--radius-xl); font-family:'Nunito',sans-serif; font-weight:600; font-size:13px; opacity:0; transition:all .3s; z-index:9999; pointer-events:none; white-space:nowrap; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }
  .cart-item { animation:fadeUp .3s ease both; }

  @media(max-width:600px){ .sidebar{width:54px;} .main{margin-left:54px;width:calc(100vw - 54px);padding:1rem 1rem 7rem;} .bottom-bar{left:54px;padding:12px 1rem;} }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="logo"><span>BU</span></div>
  <a class="nav-item" data-label="Beranda" href="index.html"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></a>
  <a class="nav-item active" data-label="Keranjang" href="cart.html"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></a>
  <a class="nav-item" data-label="Pesanan" href="orders.html"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="13" y2="15"/></svg></a>
  <a class="nav-item" data-label="Pesan" href="messages.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span class="dot"></span></a>
  <div class="spacer"></div>
  <a class="nav-item add-btn" data-label="Jual Produk" href="add-product.html"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></a>
  <a class="nav-item" data-label="Pengaturan" href="settings.html" style="margin-top:6px;"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></a>
</nav>

<main class="main">
  <div class="topbar">
    <a class="back-btn" href="index.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="page-title">🛒 Keranjang Kamu</span>
    <a class="avatar-btn" href="profile.html"><div class="avatar-ph" id="userAvatar">CA</div></a>
  </div>

  <!-- Konten cart diisi oleh cart.js -->

  <!-- Empty state -->
  <div class="empty-state" id="emptyState" style="display:block;">
    <div class="e-emoji">⏳</div>
    <p>Memuat keranjang...</p>
  </div>
</main>

<!-- Bottom bar -->
<div class="bottom-bar" id="bottomBar">
  <div class="total-wrap">
    <div class="lbl">Total dipilih</div>
    <div class="val" id="totalVal">Rp 0</div>
    <div class="cnt" id="cntVal">0 item dipilih</div>
  </div>
  <button class="btn-checkout" id="btnCO" onclick="keCheckout()" disabled>Checkout →</button>
</div>

<div id="toast"></div>

<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
